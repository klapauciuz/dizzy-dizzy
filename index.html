    <style>
      html,
      body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      svg {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #green-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        width: 100vw;
        height: 100vh;
        display: none;
      }
      #green-overlay .fill {
        fill: #D2F980;
      }
      .green-blob {
        cursor: pointer;
        --blob-scale: 1;
        transform-box: fill-box;
        transform-origin: 50% 50%;
        will-change: transform;
      }
      body.blob-filling .green-blob {
        animation: blob-fill 20s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      #art line {
        pointer-events: none;
      }
      #cells .cell {
        fill: transparent;
        transition: fill 120ms ease-out;
      }
      #cells .cell:hover {
        fill: rgba(0, 0, 0, 0.12);
      }
      @keyframes blob-fill {
        0% {
          transform: translateY(0) scale(1, 1);
        }
        25% {
          transform: translateY(-40px) scale(1.05, 1.9);
        }
        55% {
          transform: translateY(35px) scale(1.15, 3.2);
        }
        75% {
          transform: translateY(-20px) scale(1.3, 4.3);
        }
        100% {
          transform: translateY(0) scale(var(--blob-scale), var(--blob-scale));
        }
      }
    </style>

    <script>
      (() => {
        const svg = document.getElementById("art");
        if (svg) {
          const cells = svg.querySelector("#cells");
          const vb = svg.viewBox?.baseVal;
          if (cells && vb && !cells.firstChild) {
            const xs = new Set([0, vb.width]);
            const ys = new Set([0, vb.height]);
            svg.querySelectorAll("line").forEach((l) => {
              const x1 = parseFloat(l.getAttribute("x1") || "0");
              const x2 = parseFloat(l.getAttribute("x2") || "0");
              const y1 = parseFloat(l.getAttribute("y1") || "0");
              const y2 = parseFloat(l.getAttribute("y2") || "0");
              if (Math.abs(x1 - x2) <= 0.01) xs.add(Math.max(0, Math.min(vb.width, (x1 + x2) / 2)));
              if (Math.abs(y1 - y2) <= 3) ys.add(Math.max(0, Math.min(vb.height, (y1 + y2) / 2)));
            });
            const xa = Array.from(xs).sort((a, b) => a - b);
            const ya = Array.from(ys).sort((a, b) => a - b);
            const frag = document.createDocumentFragment();
            for (let j = 0; j < ya.length - 1; j++) {
              for (let i = 0; i < xa.length - 1; i++) {
                const x = xa[i];
                const y = ya[j];
                const w = xa[i + 1] - x;
                const h = ya[j + 1] - y;
                if (w <= 0.5 || h <= 0.5) continue;
                const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                r.setAttribute("class", "cell");
                r.setAttribute("x", String(x));
                r.setAttribute("y", String(y));
                r.setAttribute("width", String(w));
                r.setAttribute("height", String(h));
                frag.appendChild(r);
              }
            }
            cells.appendChild(frag);
          }
        }

        const green = document.querySelector('path[id="Vector 1"]');
        if (!green || !svg) return;

        green.addEventListener(
          "pointerdown",
          () => {
            // Bring green on top, then scale until it covers the whole SVG (screen).
            green.parentNode?.appendChild(green);
            const vb = svg.viewBox?.baseVal;
            if (!vb) return;
            const bb = green.getBBox();
            const scale = Math.max(vb.width / bb.width, vb.height / bb.height) * 2.2;
            green.style.setProperty("--blob-scale", String(scale));
            document.body.classList.add("blob-filling");
          },
          { once: true }
        );
      })();
